{% if project.youtube_url or project.instagram_url %}
<div class="project-links" aria-label="{{ project.title }} media links">
    {% if project.youtube_url %}
    <a class="project-link project-link--youtube" href="{{ project.youtube_url }}" target="_blank" rel="noopener noreferrer" aria-label="Watch {{ project.title }} on YouTube">
        <span class="project-link__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M9.5 8.7v6.6L15 12 9.5 8.7Z"></path><path d="M21 12c0 1.85-.13 3.15-.4 3.9-.22.64-.68 1.1-1.32 1.32C18.26 17.6 12 17.6 12 17.6s-6.26 0-7.28-.38A1.95 1.95 0 0 1 3.4 15.9C3.13 15.15 3 13.85 3 12s.13-3.15.4-3.9c.22-.64.68-1.1 1.32-1.32C5.74 6.4 12 6.4 12 6.4s6.26 0 7.28.38c.64.22 1.1.68 1.32 1.32.27.75.4 2.05.4 3.9Z"></path></svg>
        </span>
        <span>YouTube</span>
    </a>
    {% endif %}
    {% if project.instagram_url %}
    <a class="project-link project-link--instagram" href="{{ project.instagram_url }}" target="_blank" rel="noopener noreferrer" aria-label="View {{ project.title }} on Instagram">
        <span class="project-link__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><rect x="5" y="5" width="14" height="14" rx="4"></rect><circle cx="12" cy="12" r="3.2"></circle><circle cx="16.3" cy="7.7" r="1"></circle></svg>
        </span>
        <span>Instagram</span>
    </a>
    {% endif %}
</div>
{% endif %}
